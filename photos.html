---
layout: photos
title: "Photos"
description: ""
header-img: "img/home-bg-art.jpg"
---

<div class="gallery-page">
    {% assign photos = site.data.photos %}
    {% if photos and photos.size > 0 %}
    <div class="photo-grid">
        {% for photo in photos %}
        <figure class="photo-card" id="photo-{{ forloop.index }}">
            <a class="photo-media" href="{{ photo.image | prepend: site.baseurl }}" target="_blank" rel="noopener">
                <img src="{{ photo.image | prepend: site.baseurl }}" alt="{{ photo.title }}">
            </a>
            <figcaption class="photo-copy">
                <div class="photo-meta">
                    {% if photo.location %}<span>{{ photo.location }}</span>{% endif %}
                    {% if photo.date %}<span>{{ photo.date }}</span>{% endif %}
                </div>
                <h3>{{ photo.title }}</h3>
                {% if photo.description %}<p>{{ photo.description }}</p>{% endif %}
            </figcaption>
        </figure>
        {% endfor %}
    </div>
    {% else %}
    <div class="photo-empty">
        <h3>Gallery in progress</h3>
        <p>Selected photographs will be added here over time.</p>
    </div>
    {% endif %}
</div>
