---
layout: default
---

<header class="intro-header" style="background-image: url('{{ site.baseurl }}/{% if page.header-img %}{{ page.header-img }}{% else %}{{ site.header-img }}{% endif %}')">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1 ">
                <div class="site-heading">
                    <h1>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</h1>
                    <span class="subheading">{{ page.description }}</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container photos-shell">
    <div class="row">
        <aside class="col-lg-2 col-md-2 col-sm-12 col-xs-12 photos-sidebar">
            <div class="photos-sidebar-panel">
                <h5>Albums</h5>
                {% include photos-sidebar.html %}
            </div>
        </aside>

        <main class="col-lg-10 col-md-10 col-sm-12 col-xs-12 photos-content">
            {{ content }}
        </main>
    </div>
</div>
